<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Planet Toyota – Quotation Manager</title>
<meta name="theme-color" content="#EB0A1E" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="PT Quotes" />
<link rel="manifest" href="manifest.json" />
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; }
#app { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; overflow: hidden; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* ===== SCREENS ===== */
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }
.screen-body { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 32px; -webkit-overflow-scrolling: touch; }

/* ===== TOPBAR ===== */
.topbar { background: #000; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; min-height: 52px; }
.topbar-title { color: #fff; font-size: 15px; font-weight: 700; }
.topbar-sub { color: #aaa; font-size: 11px; margin-top: 1px; }
.topbar-left { display: flex; flex-direction: column; }
.topbar-right { display: flex; gap: 8px; }
.back-btn { background: none; border: none; color: #fff; font-size: 24px; line-height: 1; padding: 0 6px 0 0; }
.icon-btn { background: none; border: none; color: #aaa; font-size: 18px; padding: 4px; }
.icon-btn.red { color: #EB0A1E; font-size: 22px; font-weight: 700; }

/* ===== LOGIN ===== */
.login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px 20px; background: #fff; }
.login-logo { text-align: center; margin-bottom: 28px; }
.logo-box { width: 64px; height: 64px; background: #EB0A1E; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.logo-t { color: #fff; font-size: 36px; font-weight: 900; line-height: 1; }
.login-brand { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: #111; }
.login-sub { font-size: 12px; color: #888; margin-top: 4px; }
.login-card { width: 100%; max-width: 340px; }
.login-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
.pin-dots { display: flex; justify-content: center; gap: 14px; margin: 16px 0 20px; }
.pin-dots span { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #ccc; background: transparent; transition: all 0.1s; }
.pin-dots span.filled { background: #EB0A1E; border-color: #EB0A1E; }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 280px; margin: 0 auto; }
.pin-key { padding: 16px 10px; background: #f5f5f5; border: none; border-radius: 12px; font-size: 20px; font-weight: 600; color: #111; text-align: center; transition: background 0.1s; }
.pin-key:active { background: #e0e0e0; }
.pin-key.del { font-size: 18px; color: #666; }
.login-error { color: #EB0A1E; font-size: 13px; text-align: center; margin-top: 12px; min-height: 18px; }
.login-manager-link { margin-top: 28px; color: #888; font-size: 13px; text-decoration: underline; cursor: pointer; }

/* ===== HERO CARD ===== */
.hero-card { background: linear-gradient(120deg, #111 50%, #2d0008); border-radius: 16px; padding: 18px 18px 20px; margin-bottom: 14px; color: #fff; }
.hero-greeting { font-size: 12px; color: #aaa; letter-spacing: 0.5px; margin-bottom: 2px; }
.hero-name { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
.hero-stats { display: flex; align-items: center; gap: 0; }
.hstat { flex: 1; text-align: center; }
.hstat-v { font-size: 22px; font-weight: 800; color: #EB0A1E; }
.hstat-l { font-size: 10px; color: #888; margin-top: 2px; }
.hstat-div { width: 1px; height: 36px; background: #333; }

/* ===== NEW QUOTE BTN ===== */
.new-quote-btn { width: 100%; padding: 14px; background: #EB0A1E; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; margin-bottom: 18px; letter-spacing: 0.3px; }
.new-quote-btn:active { opacity: 0.9; transform: scale(0.99); }

/* ===== SECTION LABELS ===== */
.section-label { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.8px; margin-bottom: 8px; }

/* ===== SEARCH ===== */
.search-wrap { margin-bottom: 12px; }
.search-input { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; background: #fafafa; }
.search-input:focus { outline: none; border-color: #EB0A1E; box-shadow: 0 0 0 2px rgba(235,10,30,0.08); }

/* ===== QUOTE CARDS ===== */
.qcard { background: #fff; border: 1px solid #eeeeee; border-radius: 14px; padding: 13px 15px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.qcard:active { background: #fafafa; }
.qcard-top { display: flex; justify-content: space-between; margin-bottom: 3px; }
.qcard-name { font-weight: 700; font-size: 14px; color: #111; }
.qcard-date { font-size: 11px; color: #aaa; }
.qcard-vehicle { font-size: 13px; color: #666; margin-bottom: 6px; }
.qcard-bottom { display: flex; justify-content: space-between; align-items: center; }
.qcard-id { font-size: 11px; color: #bbb; }
.qcard-price { font-size: 15px; font-weight: 800; color: #EB0A1E; }
.qcard-exec { font-size: 11px; color: #aaa; background: #f5f5f5; padding: 2px 8px; border-radius: 10px; }
.empty-state { text-align: center; color: #bbb; padding: 44px 0; font-size: 14px; }

/* ===== FORM ===== */
.form-section { background: #111; padding: 9px 12px; border-radius: 8px; margin: 16px 0 10px; color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.field-label { font-size: 12px; font-weight: 600; color: #666; display: block; margin-bottom: 5px; margin-top: 12px; }
.field-input { width: 100%; padding: 11px 13px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; color: #111; background: #fff; -webkit-appearance: auto; appearance: auto; }
.field-input:focus { outline: none; border-color: #EB0A1E; box-shadow: 0 0 0 2px rgba(235,10,30,0.1); }
.field-row { display: flex; gap: 10px; }
.field-half { flex: 1; }
.tcs-row { background: #f8f8f8; border-radius: 10px; padding: 11px 13px; display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.tcs-info { font-size: 13px; font-weight: 600; }
.tcs-sub { font-size: 11px; color: #888; }
.tcs-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #666; }
.tcs-toggle input[type=checkbox] { width: 20px; height: 20px; accent-color: #EB0A1E; }

/* ===== ACCESSORIES ===== */
.acc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.acc-chip { padding: 7px 11px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #ddd; background: #fafafa; color: #555; user-select: none; -webkit-user-select: none; }
.acc-chip.active { border: 2px solid #EB0A1E; background: #fff0f0; color: #EB0A1E; font-weight: 600; }
.acc-total { font-size: 12px; color: #EB0A1E; font-weight: 700; margin-top: 6px; }

/* ===== PRICE SUMMARY ===== */
.price-summary { background: #f8f8f8; border-radius: 12px; padding: 10px 14px; margin-top: 14px; }
.price-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid #eee; font-size: 13px; }
.price-row .pl { color: #666; }
.price-row.discount { color: #1a8a4a; }
.price-total { display: flex; justify-content: space-between; padding: 10px 0 2px; border-top: 2px solid #EB0A1E; margin-top: 4px; font-size: 16px; font-weight: 800; color: #EB0A1E; }

/* ===== BUTTONS ===== */
.btn-primary { width: 100%; padding: 14px; background: #EB0A1E; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; margin-top: 12px; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-primary:active { opacity: 0.9; }
.btn-whatsapp { width: 100%; padding: 14px; background: #25D366; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; margin-top: 10px; }
.btn-outline { flex: 1; padding: 11px; background: transparent; border: 1.5px solid #EB0A1E; color: #EB0A1E; border-radius: 10px; font-size: 13px; font-weight: 700; }
.btn-row { display: flex; gap: 10px; margin-top: 10px; }

/* ===== QUOTATION PREVIEW ===== */
.quote-doc { border: 2px solid #EB0A1E; border-radius: 14px; overflow: hidden; margin-bottom: 14px; }
.qdoc-header { background: #000; padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start; }
.qdoc-dealer { color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 1px; }
.qdoc-dealer-sub { color: #888; font-size: 10px; margin-top: 2px; }
.qdoc-id { color: #EB0A1E; font-weight: 800; font-size: 13px; }
.qdoc-date { color: #aaa; font-size: 10px; margin-top: 2px; text-align: right; }
.qdoc-tag { background: #EB0A1E; color: #fff; font-size: 9px; padding: 2px 7px; border-radius: 3px; margin-top: 4px; display: inline-block; }
.qdoc-body { padding: 14px 16px; }
.qdoc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.qdoc-cell { background: #f8f8f8; border-radius: 10px; padding: 10px 12px; }
.qdoc-cell-label { font-size: 9px; color: #888; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
.qdoc-cell-primary { font-size: 14px; font-weight: 700; color: #111; }
.qdoc-cell-secondary { font-size: 12px; color: #666; margin-top: 1px; }
.qdoc-cell-accent { font-size: 12px; color: #EB0A1E; font-weight: 500; }
.qdoc-section-label { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 0.5px; margin-bottom: 7px; }
.qdoc-breakdown { background: #f9f9f9; border-radius: 10px; padding: 8px 12px; margin-bottom: 12px; }
.qdoc-price-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid #eee; font-size: 13px; color: #444; }
.qdoc-price-row.disc { color: #1a8a4a; }
.qdoc-total-row { display: flex; justify-content: space-between; padding: 10px 0 2px; border-top: 2px solid #EB0A1E; margin-top: 4px; font-size: 16px; font-weight: 800; color: #EB0A1E; }
.qdoc-acc-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 0.5px solid #f0f0f0; color: #444; }
.qdoc-finance { background: #f0f4ff; border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; }
.qdoc-finance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 12px; margin-top: 4px; }
.qdoc-finance-grid span { color: #888; }
.qdoc-note { background: #fffbe6; border-radius: 8px; padding: 8px 12px; font-size: 12px; margin-bottom: 12px; color: #555; }
.qdoc-footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #eee; padding-top: 12px; }
.qdoc-footer-exec { font-size: 13px; font-weight: 700; color: #111; }
.qdoc-footer-sub { font-size: 10px; color: #888; margin-top: 2px; }
.qdoc-sig { text-align: right; }
.qdoc-sig-label { font-size: 10px; color: #aaa; margin-bottom: 18px; }
.qdoc-sig-line { width: 90px; border-bottom: 1px solid #bbb; display: inline-block; }

/* ===== MANAGER DASHBOARD ===== */
.mgr-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.mgr-stat { background: #f8f8f8; border-radius: 12px; padding: 14px; text-align: center; }
.mgr-stat-v { font-size: 24px; font-weight: 800; color: #EB0A1E; }
.mgr-stat-l { font-size: 11px; color: #888; margin-top: 3px; }
.mgr-exec-row { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.mgr-exec-name { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 4px; }
.mgr-exec-meta { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
.mgr-exec-value { color: #EB0A1E; font-weight: 700; }
.mgr-filter-row { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
.mgr-filter { padding: 7px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fafafa; font-size: 12px; font-weight: 600; color: #666; white-space: nowrap; cursor: pointer; }
.mgr-filter.active { background: #EB0A1E; color: #fff; border-color: #EB0A1E; }
.mgr-all-quotes { max-height: 420px; overflow-y: auto; }
.sync-status { background: #f0f0f0; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #25D366; }
.sync-dot.pending { background: #f0a500; }
.sync-dot.error { background: #EB0A1E; }
.mgr-gs-config { background: #f0f4ff; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
.mgr-gs-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #334; }
.mgr-gs-sub { font-size: 11px; color: #778; margin-bottom: 10px; }
.mgr-bar-wrap { margin-bottom: 16px; }
.mgr-bar-label { font-size: 12px; color: #555; margin-bottom: 4px; display: flex; justify-content: space-between; }
.mgr-bar-track { background: #eee; border-radius: 10px; height: 8px; overflow: hidden; }
.mgr-bar-fill { background: #EB0A1E; height: 100%; border-radius: 10px; transition: width 0.4s; }

/* ===== TOAST ===== */
.sync-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 500; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 9999; white-space: nowrap; }
.sync-toast.show { opacity: 1; }

/* ===== TENURE SLIDER ===== */
.tenure-slider { width: 100%; accent-color: #EB0A1E; }
.tenure-labels { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-top: 2px; }

/* ===== PRINT ===== */
@media print {
  /* Hide everything except the quotation document */
  .no-print,
  .topbar,
  .btn-primary,
  .btn-whatsapp,
  .btn-outline,
  .btn-row,
  #screen-login,
  #screen-home,
  #screen-dashboard,
  #screen-form,
  #screen-manpower,
  .sync-toast { display: none !important; }

  /* Reset layout for print */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  html, body { width: 100%; height: auto; margin: 0; padding: 0; background: #fff; }
  #app { max-width: 100% !important; width: 100% !important; box-shadow: none !important; min-height: auto; overflow: visible; }

  /* Show only preview screen */
  #screen-preview { display: block !important; min-height: auto; }
  #screen-preview .screen-body { padding: 0 !important; overflow: visible !important; }

  /* Quotation document */
  .quote-doc { border: 1.5px solid #EB0A1E !important; width: 100% !important; box-shadow: none !important; page-break-inside: avoid; }

  /* Ensure colors print */
  .qdoc-header { background: #000 !important; -webkit-print-color-adjust: exact; }
  .qdoc-dealer { color: #fff !important; }
  .qdoc-id { color: #EB0A1E !important; }
  .qdoc-tag { background: #EB0A1E !important; color: #fff !important; }
  .qdoc-total-row { color: #EB0A1E !important; border-top: 2px solid #EB0A1E !important; }

  /* Page settings */
  @page { margin: 10mm; size: A4; }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* ===== TOGGLE BUTTONS ===== */
.toggle-row { display:flex; gap:0; margin-bottom:4px; border-radius:10px; overflow:hidden; border:1px solid #ddd; }
.toggle-btn { flex:1; padding:11px; background:#f8f8f8; border:none; font-size:14px; font-weight:600; color:#888; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.toggle-btn.active { background:#EB0A1E; color:#fff; }
.toggle-btn:first-child { border-radius:9px 0 0 9px; }
.toggle-btn:last-child { border-radius:0 9px 9px 0; }

/* ===== TOGGLE BUTTONS ===== */
.toggle-row { display:flex; gap:0; margin-bottom:4px; border-radius:10px; overflow:hidden; border:1px solid #ddd; }
.toggle-btn { flex:1; padding:11px; background:#f8f8f8; border:none; font-size:14px; font-weight:600; color:#888; cursor:pointer; font-family:inherit; transition:all 0.15s; }
.toggle-btn.active { background:#EB0A1E; color:#fff; }
</style>
</head>
<body>
<div id="app">
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="login-logo">
        <div class="logo-box"><span class="logo-t">T</span></div>
        <div class="login-brand">PLANET TOYOTA</div>
        <div class="login-sub">Quotation Manager · Narnaul</div>
      </div>
      <div class="login-card">
        <div class="login-title">Select Your Name</div>
        <select id="exec-select" class="field-input"></select>
        <div class="login-title" style="margin-top:18px">Enter PIN</div>
        <div class="pin-dots" id="pin-dots"><span></span><span></span><span></span><span></span></div>
        <div class="pin-pad" id="pin-pad"></div>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>
  </div>
  <div id="screen-home" class="screen">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">PT Quotes</div>
        <div class="topbar-sub" id="home-exec-name"></div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="logout()">⎋</button>
      </div>
    </div>
    <div class="screen-body">
      <div class="hero-card">
        <div class="hero-greeting" id="hero-greeting">Good morning,</div>
        <div class="hero-name" id="hero-name">Executive</div>
        <div class="hero-stats">
          <div class="hstat"><div class="hstat-v" id="hs-total">0</div><div class="hstat-l">My Quotes</div></div>
          <div class="hstat-div"></div>
          <div class="hstat"><div class="hstat-v" id="hs-month">0</div><div class="hstat-l">This Month</div></div>
          <div class="hstat-div"></div>
          <div class="hstat"><div class="hstat-v" id="hs-value">₹0</div><div class="hstat-l">Pipeline</div></div>
        </div>
      </div>
      <button class="new-quote-btn" onclick="goTo('form')">+ New Quotation</button>
      <div class="section-label">MY QUOTES</div>
      <div class="search-wrap">
        <input type="search" id="home-search" class="search-input" placeholder="Search customer, model, suffix..." oninput="renderHomeQuotes()" />
      </div>
      <div id="home-quote-list"></div>
    </div>
  </div>
  <div id="screen-dashboard" class="screen">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="dash-role-label"></div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="logout()">⎋</button>
      </div>
    </div>
    <div class="screen-body" id="dashboard-body"></div>
  </div>
  <div id="screen-form" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="currentUser&&[ROLE.OWNER,ROLE.GM,ROLE.SM,ROLE.TL].includes(currentUser.role)?goTo('dashboard'):goTo('home')">‹</button>
      <div class="topbar-title">New Quotation</div>
      <div style="width:36px"></div>
    </div>
    <div class="screen-body" id="form-body"></div>
  </div>
  <div id="screen-preview" class="screen">
    <div class="topbar no-print">
      <button class="back-btn" onclick="currentUser&&[ROLE.OWNER,ROLE.GM,ROLE.SM,ROLE.TL].includes(currentUser.role)?goTo('dashboard'):goTo('home')">‹</button>
      <div class="topbar-title" id="preview-title">Quotation</div>
      <button class="icon-btn" onclick="initFormState();goTo('form')" style="color:#EB0A1E;font-size:22px;font-weight:700">+</button>
    </div>
    <div class="screen-body" id="preview-body"></div>
  </div>
  <div id="screen-manpower" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="goTo('dashboard')">‹</button>
      <div class="topbar-title">Manage Staff & PINs</div>
      <div style="width:36px"></div>
    </div>
    <div class="screen-body" id="manpower-body"></div>
  </div>
</div>
<div id="sync-toast" class="sync-toast"></div>
<script>
// ============================================================
// PLANET TOYOTA QMS — EMBEDDED IMAGES (auto-generated)

// ---- Number to Words (Indian) ----
function numToWords(n) {
  n = Math.round(n);
  if (!n || n === 0) return "Zero";
  const ones = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine",
    "Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function h(num) {
    if (num === 0) return "";
    if (num < 20) return ones[num] + " ";
    if (num < 100) return tens[Math.floor(num/10)] + " " + (ones[num%10] ? ones[num%10] + " " : "");
    return ones[Math.floor(num/100)] + " Hundred " + h(num%100);
  }
  let r = "", x = n;
  const cr = Math.floor(x/10000000); x %= 10000000;
  const lac = Math.floor(x/100000); x %= 100000;
  const th = Math.floor(x/1000); x %= 1000;
  if (cr) r += h(cr) + "Crore ";
  if (lac) r += h(lac) + "Lakh ";
  if (th) r += h(th) + "Thousand ";
  if (x) r += h(x);
  return r.trim() + " Only";
}

function getVisibleQuotes(user, allQuotes) {
  if ([ROLE.OWNER, ROLE.GM, ROLE.SM].includes(user.role)) return allQuotes;
  if (user.role === ROLE.TL) {
    const staff = getStaff();
    const myExecs = staff.filter(s => s.teamId === user.teamId && s.role === ROLE.EXEC).map(s=>s.name);
    myExecs.push(user.name);
    return allQuotes.filter(q => myExecs.includes(q.exec));
  }
  return allQuotes.filter(q => q.exec === user.name);
}

function formatINR(n) {
  if (!n||isNaN(n)) return "₹0";
  return new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
}
function genId() {
  const d=new Date();
  return `PT${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}-${Math.floor(Math.random()*900)+100}`;
}
function greeting() { const h=new Date().getHours(); return h<12?"Good morning,":h<17?"Good afternoon,":"Good evening,"; }

function toast(msg,dur=2800) { const t=document.getElementById("sync-toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),dur); }
function goTo(name) {
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));

  if(el){el.classList.add("active");el.scrollTop=0;}
  if(name==="home") renderHome();

  if(name==="manpower") renderManpower();
}

// ---- Vehicle Data ----
async function loadVehicleData() {
  if(VEHICLE_LOADED) return;
  try {
    toast("⏳ Loading vehicle data...",3000);
    const resp = await fetch(SHEETS_URL+"?action=getVehicles&t="+Date.now());
    const json = await resp.json();
    if(json.status==="ok"&&json.data){ VEHICLE_DATA=json.data; VEHICLE_LOADED=true; toast("✅ Vehicle data loaded"); }
  } catch { toast("⚠️ Could not load prices — check connection"); }
}

function initLogin() {
  pinBuffer="";
  const staff = getStaff();
  const sel = document.getElementById("exec-select");
  sel.innerHTML=`<option value="">— Select Your Name —</option>`;
  staff.forEach(s=>{
    const o=document.createElement("option");
    o.value=s.id; o.textContent=`${s.name} (${s.role})`; sel.appendChild(o);
  });
  sel.onchange=()=>{ pinBuffer=""; renderPinDots(); document.getElementById("login-error").textContent=""; };
  buildPinPad(); renderPinDots();
}
function buildPinPad() {
  const pad=document.getElementById("pin-pad"); pad.innerHTML="";
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(k=>{
    const btn=document.createElement("button");
    btn.className="pin-key"+(k==="⌫"?" del":"");
    btn.textContent=k;
    if(k===""){btn.disabled=true;btn.style.cssText="background:transparent;border:none;";}
    btn.addEventListener("click",()=>handlePin(String(k)));
    pad.appendChild(btn);
  });
}
function renderPinDots() { document.querySelectorAll("#pin-dots span").forEach((d,i)=>d.classList.toggle("filled",i<pinBuffer.length)); }
function handlePin(k) {
  if(k==="⌫"){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return;}
  if(k===""||pinBuffer.length>=4) return;
  pinBuffer+=k; renderPinDots();
  if(pinBuffer.length===4) setTimeout(tryLogin,120);
}
function tryLogin() {
  const errEl=document.getElementById("login-error");
  const staffId=document.getElementById("exec-select").value;
  if(!staffId){errEl.textContent="Please select your name first.";pinBuffer="";renderPinDots();return;}
  const staff=getStaff();
  const user=staff.find(s=>s.id===staffId);
  if(user&&user.pin===pinBuffer){
    currentUser={...user}; errEl.textContent="";
    loadVehicleData();
    if([ROLE.OWNER,ROLE.GM,ROLE.SM,ROLE.TL].includes(user.role)) goTo("dashboard");
    else goTo("home");
  } else { errEl.textContent="Incorrect PIN. Please try again."; pinBuffer=""; renderPinDots(); }
}

  document.getElementById("hero-name").textContent=currentUser.name.split(" ")[0];

  document.getElementById("hs-month").textContent=mine.filter(thisMonth).length;

function renderHomeQuotes() {

function renderDashboard() {
  if(!currentUser) return;
  const all=loadQuotes();

  const staff=getStaff();
  const now=new Date();

  // Filter
  let filtered=visible;
  if(mgrFilter==="today") filtered=visible.filter(q=>new Date(q.savedAt||0).toDateString()===now.toDateString());
  else if(mgrFilter==="month") filtered=visible.filter(thisMonth);
  else if(mgrFilter!=="all") filtered=visible.filter(q=>q.exec===mgrFilter);

  const totalORP=filtered.reduce((s,q)=>s+(q.pr?.orp||0),0);
  const pv=totalORP>=1e7?`₹${(totalORP/1e7).toFixed(1)}Cr`:totalORP>=1e5?`₹${(totalORP/1e5).toFixed(0)}L`:`₹${Math.round(totalORP/1000)}K`;

  // Executive performance from visible quotes
  const execMap={};
  visible.forEach(q=>{
    const e=q.exec||"Unknown";
    if(!execMap[e]) execMap[e]={count:0,value:0};
    execMap[e].count++; execMap[e].value+=q.pr?.orp||0;

  const execRows=Object.entries(execMap).sort((a,b)=>b[1].value-a[1].value);
  const maxVal=execRows[0]?.[1]?.value||1;

  // Filter buttons
  const filterPeople=visible.map(q=>q.exec).filter((v,i,a)=>a.indexOf(v)===i);
  const filterLabels=[["all","All"],["today","Today"],["month","Month"],...filterPeople.map(n=>[n,n.split(" ")[0]])];

  const body=document.getElementById("dashboard-body");
  body.innerHTML=`
    <div style="padding:16px 16px 0">

    <div style="padding:0 16px">

        <div class="mgr-stat"><div class="mgr-stat-v">${visible.filter(thisMonth).length}</div><div class="mgr-stat-l">This Month</div></div>
        <div class="mgr-stat"><div class="mgr-stat-v">${visible.filter(q=>new Date(q.savedAt||0).toDateString()===now.toDateString()).length}</div><div class="mgr-stat-l">Today</div></div>
        <div class="mgr-stat"><div class="mgr-stat-v">${pv}</div><div class="mgr-stat-l">Pipeline</div></div>
      </div>

      <div class="section-label">PERFORMANCE</div>
      ${execRows.slice(0,8).map(([name,d])=>`
        <div class="mgr-exec-row">
          <div class="mgr-exec-name">${name}</div>
          <div class="mgr-bar-wrap"><div class="mgr-bar-track"><div class="mgr-bar-fill" style="width:${Math.round(d.value/maxVal*100)}%"></div></div></div>
          <div class="mgr-exec-meta"><span>${d.count} quote${d.count!==1?"s":""}</span><span class="mgr-exec-value">${formatINR(d.value)}</span></div>
        </div>`).join("")}

      <div class="section-label" style="margin-top:16px">FILTER QUOTES</div>
      <div class="mgr-filter-row">${filterLabels.map(([v,l])=>`<button class="mgr-filter${mgrFilter===v?" active":""}" onclick="mgrFilter='${v}';renderDashboard()">${l}</button>`).join("")}</div>

            </div>`).join("")}
      </div>
      ${canManageStaff(currentUser.role)?`<button class="btn-primary" style="margin-top:16px" onclick="goTo('manpower')">👥 Manage Staff & PINs</button>`:""}

function toggleTeamSelect() {
  const role=document.getElementById("ns-role").value;
  const tw=document.getElementById("ns-team-wrap");
  if(tw) tw.style.display=(role===ROLE.EXEC||role===ROLE.TL)?"block":"none";
}

function saveNewStaff() {
  const name=document.getElementById("ns-name").value.trim();
  const role=document.getElementById("ns-role").value;
  const mobile=document.getElementById("ns-mobile")?.value.trim()||"";
  const pin=String(document.getElementById("ns-pin").value).trim();
  const teamSel=document.getElementById("ns-team");
  const teamId=teamSel?teamSel.value:"";
  if(!name||!role||!pin||pin.length!==4){toast("⚠️ Please fill all fields correctly");return;}
  const staff=getStaff();
  // Generate team ID for new TL
  let finalTeamId=teamId;
  if(role===ROLE.TL&&teamId==="NEW"){
    const existing=staff.filter(s=>s.teamId&&s.teamId.startsWith("T")).map(s=>parseInt(s.teamId.slice(1))||0);
    finalTeamId="T"+(Math.max(0,...existing)+1);
  }
  if((role===ROLE.EXEC||role===ROLE.TL)&&!finalTeamId){toast("⚠️ Please select a team");return;}
  const newId="u"+Date.now();
  staff.push({id:newId,name,role,pin,mobile,teamId:finalTeamId||null});
  saveStaff(staff);
  toast("✅ "+name+" added successfully");
  renderManpower();
}

function editStaff(id) {
  const staff=getStaff();
  const s=staff.find(x=>x.id===id); if(!s) return;
  const tls=staff.filter(x=>x.role===ROLE.TL);
  const form=document.getElementById("add-staff-form");
  form.innerHTML=`
    <div style="background:#fff0f0;border-radius:12px;padding:16px;margin-top:16px;border:1px solid #f5c6cb">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px">Edit: ${s.name}</div>
      <label class="field-label">Full Name *</label>
      <input class="field-input" id="es-name" value="${s.name}" />
      <label class="field-label">Mobile Number</label>
      <input class="field-input" id="es-mobile" type="tel" maxlength="10" value="${s.mobile||''}" placeholder="10-digit mobile" />
      <label class="field-label">PIN * (4 digits)</label>
      <input class="field-input" id="es-pin" type="number" value="${s.pin}" maxlength="4" />
      ${s.role===ROLE.EXEC?`
        <label class="field-label">Team</label>
        <select class="field-input" id="es-team">
          ${tls.map(tl=>`<option value="${tl.teamId}" ${tl.teamId===s.teamId?"selected":""}>${tl.name}'s Team</option>`).join("")}
        </select>`:""}
      <div style="display:flex;gap:10px;margin-top:14px">
        <button class="btn-primary" style="margin-top:0" onclick="saveEditStaff('${id}')">Update</button>
        <button class="btn-outline" onclick="document.getElementById('add-staff-form').innerHTML=''">Cancel</button>
      </div>
    </div>`;
  form.scrollIntoView({behavior:"smooth"});
}

function saveEditStaff(id) {
  const staff=getStaff();
  const i=staff.findIndex(s=>s.id===id); if(i<0) return;
  const name=document.getElementById("es-name").value.trim();
  const mobile=document.getElementById("es-mobile")?.value.trim()||"";
  const pin=String(document.getElementById("es-pin").value).trim();
  const teamSel=document.getElementById("es-team");
  if(!name||!pin||pin.length!==4){toast("⚠️ Please fill all fields correctly");return;}
  staff[i].name=name; staff[i].pin=pin; staff[i].mobile=mobile;
  if(teamSel) staff[i].teamId=teamSel.value;
  saveStaff(staff);
  toast("✅ Updated successfully");
  renderManpower();
}

function deleteStaff(id) {
  const staff=getStaff();
  const s=staff.find(x=>x.id===id); if(!s) return;
  if(!confirm(`Delete ${s.name}? This cannot be undone.`)) return;
  saveStaff(staff.filter(x=>x.id!==id));
  toast("🗑️ "+s.name+" removed");
  renderManpower();
}

function onColourSelect(colour) {

  if(row){

    formState.interior=row["Interior"]||"";

    formState.ew2=parseFloat(row["EW 2 Year Price"])||0;

        <div style="font-size:15px;font-weight:700;color:#EB0A1E">${formatINR(formState.exShowroom)}</div></div>

}
function renderRTOField() {
  const isH=formState.custState==="Haryana";
  document.getElementById("rto-field").innerHTML=`
    <label class="field-label">${isH?"RTO & Registration (₹)":"Temp. Registration (₹)"}</label>
    <input class="field-input" id="f-rto" type="number" placeholder="${isH?"Enter RTO amount":"Enter temp. registration amount"}" value="${formState.rto||""}" oninput="formState.rto=parseFloat(this.value)||0;updateSummary()" />`;

function renderInsuranceField() {
  const isP=formState.regType==="Personal";
  let html=`<label class="field-label">Insurance Type</label><select class="field-input" id="f-insType" onchange="formState.insuranceType=this.value">`;
  if(isP) html+=`<option value="">— Select —</option><option>Insurance 1+3 Years</option><option>Insurance 3+3 Years</option>`;
  else { html+=`<option value="Insurance 1+1 Years">Insurance 1+1 Years</option>`; formState.insuranceType="Insurance 1+1 Years"; }

function renderEPCField() {
  const show=EPC_MODELS.includes(formState.model)&&formState.regType==="Personal"&&formState.custState==="Haryana";

  document.getElementById("epc-row").innerHTML=`

function renderEWField() {
  const ew2=formState.ew2||0,ew3=formState.ew3||0;

}
function onEWSelect(val){formState.ewDuration=val?val+" Year":"";formState.ewPrice=val==="2"?formState.ew2:val==="3"?formState.ew3:0;updateSummary();}

function calcPricing() {
  const exS=formState.exShowroom||0;
  const tcsA=formState.tcs?Math.round(exS*0.01):0;
  const epcA=formState.epc?Math.round(exS*0.01):0;
  const ins=parseFloat(formState.insurance)||0;
  const rto=parseFloat(formState.rto)||0;
  const hsrp=formState.hsrp?1500:0;
  const fastag=formState.fastag?800:0;
  const tga=parseFloat(formState.tga)||0;
  const tgloss=parseFloat(formState.tgloss)||0;
  const tsmile=parseFloat(formState.tsmile)||0;
  const ew=parseFloat(formState.ewPrice)||0;
  const other=parseFloat(formState.otherCharges)||0;
  const disc=parseFloat(formState.discount)||0;
  const orp=exS+tcsA+epcA+ins+rto+hsrp+fastag+tga+tgloss+tsmile+ew+other-disc;
  return{exS,tcsA,epcA,ins,rto,hsrp,fastag,tga,tgloss,tsmile,ew,other,disc,orp};
}
function updateSummary() {
  const p=calcPricing();
  const discAmt=p.disc||0;
  const tl=document.getElementById("tcs-label"); if(tl) tl.textContent=`Auto-calculated · ${formatINR(p.tcsA)}`;
  const tv=document.getElementById("tcs-val"); if(tv) tv.textContent=formatINR(p.tcsA);
  const wrap=document.getElementById("price-summary-wrap"); if(!wrap) return;
  const rows=[
    ["Ex-Showroom Price",p.exS],
    [document.getElementById("f-insType")?.value||"Insurance",p.ins],
    [formState.custState==="Haryana"?"RTO & Registration":"Temp. Registration",p.rto],
    ["TCS @ 1%",p.tcsA],
    ["EPC @ 1%",p.epcA],
    ["Extended Warranty"+(formState.ewDuration?" ("+formState.ewDuration+")":""),p.ew],
    ["Toyota Genuine Accessories",p.tga],
    ["T-Gloss",p.tgloss],
    ["HSRP Garnish",p.hsrp],
    ["FASTag",p.fastag],
    ["T-Smile",p.tsmile],
    ["Other Charges",p.other],
  ].filter(([,v])=>v>0);
  wrap.innerHTML=`<div class="price-summary" style="margin-top:16px">
    <div class="section-label" style="margin-bottom:8px">PRICE SUMMARY</div>
    ${rows.map(([l,v])=>`<div class="price-row"><span class="pl">${l}</span><span>${formatINR(v)}</span></div>`).join("")}
    ${discAmt>0?`<div class="price-row discount"><span class="pl">Discount / Offer</span><span style="color:#1a8a4a">− ${formatINR(discAmt)}</span></div>`:""}
    <div class="price-total"><span>On-Road Price</span><span>${formatINR(p.orp)}</span></div>
  </div>`;
  const btn=document.getElementById("gen-btn");
  if(btn) btn.disabled=!(formState.cName&&formState.model&&formState.variant&&formState.exShowroom>0);
}
function generateQuote() {
  const p=calcPricing();
  const insType=document.getElementById("f-insType")?.value||formState.insuranceType||"";
  const q={
    id:genId(),date:new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),
    savedAt:Date.now(),mfgYear:formState.mfgYear,
    cust:{name:formState.cName,phone:formState.cPhone,city:formState.cCity},
    veh:{model:formState.model,variant:formState.variant,colour:formState.colour,interior:formState.interior,suffix:formState.suffix,fuelType:formState.fuelType},
    reg:{type:formState.regType,state:formState.custState},
    pr:{...p,insuranceType:insType,ewDuration:formState.ewDuration,discount:formState.discount},
    hypothecation:formState.hypothecation,exec:currentUser.name,notes:formState.notes,
  };
  saveQuoteLocal(q); syncToSheets(q); currentQuote=q;
  renderPreview(q); goTo("preview"); toast("✅ Quotation saved!");
}

function renderPreview(q) {
  const shareUrl=`${APP_BASE_URL}/quote.html?id=${q.id}`;
  document.getElementById("preview-body").innerHTML=`
    ${buildPreviewHTML(q)}
    <div class="no-print">
      <button class="btn-primary" onclick="savePDF()">🖨️ Save as PDF</button>
      <button class="btn-whatsapp" onclick="shareWALink('${q.id}')">📲 Share Link on WhatsApp</button>
      <div style="background:#f0f4ff;border-radius:10px;padding:10px 14px;margin-top:10px;font-size:12px;color:#334">
        <strong>PDF steps:</strong> Tap "Save as PDF" → In print dialog select "Save as PDF" → Open in Files → Share to WhatsApp
      </div>
      <div class="btn-row">
        <button class="btn-outline" onclick="${[ROLE.OWNER,ROLE.GM,ROLE.SM,ROLE.TL].includes(currentUser?.role)?"goTo('dashboard')":"goTo('home')"}">← Back</button>
        <button class="btn-outline" onclick="initFormState();goTo('form')">+ New Quote</button>
      </div>
    </div>
    <div style="height:24px"></div>`;
}

function savePDF() { window.print(); }

function shareWALink(id) {
  const q=loadQuotes().find(x=>x.id===id); if(!q) return;
  const staff=getStaff();
  const execUser=staff.find(s=>s.name===q.exec);
  const tlUser=staff.find(s=>s.role===ROLE.TL&&s.teamId===execUser?.teamId);
  const seniorRoles=[ROLE.OWNER,ROLE.GM,ROLE.SM];
  const isSenior=seniorRoles.includes(execUser?.role);
  const url=`${APP_BASE_URL}/quote.html?id=${id}`;
  let contactLine="";
  if(!isSenior){
    const execMobile=execUser?.mobile||"";
    const tlMobile=tlUser?.mobile||"";
    contactLine=`\n\n👤 *Guest Experience Manager:* ${q.exec}${execMobile?" · 📞 "+execMobile:""}`;
    if(tlUser) contactLine+=`\n👤 *Team Leader:* ${tlUser.name}${tlMobile?" · 📞 "+tlMobile:""}`;
  }
  const msg=`🚗 *Planet Toyota – Quotation*\n\nDear ${q.cust?.name||"Customer"},\n\nPlease find your vehicle quotation below:\n\n📄 *${q.veh?.model||""}*\n*Quote No:* ${id}\n*On-Road Price:* ${formatINR(q.pr?.orp)}\n\n👉 *View Full Quotation:*\n${url}${contactLine}\n\n_Valid 7 days · Planet Toyota, Narnaul_\n_Authorised Toyota Kirloskar Motor Dealer_`;
  window.open(`https://wa.me/${q.cust?.phone?q.cust.phone:""}?text=${encodeURIComponent(msg)}`,"_blank");
}

async function syncToSheets(q) {
  if(!SHEETS_URL) return;
  try {
    const payload={
      action:"saveQuote",id:q.id,date:q.date,mfgYear:q.mfgYear,exec:q.exec,
      customerName:q.cust.name,customerPhone:q.cust.phone,customerCity:q.cust.city,
      model:q.veh.model,variant:q.veh.variant,fuelType:q.veh.fuelType,
      colour:q.veh.colour,interior:q.veh.interior,suffixCode:q.veh.suffix,
      regType:q.reg?.type,customerState:q.reg?.state,
      exShowroom:q.pr.exS,tga:q.pr.tga,tgloss:q.pr.tgloss,tsmile:q.pr.tsmile,
      ewDuration:q.pr.ewDuration,ewPrice:q.pr.ew,
      epc:q.pr.epcA,tcs:q.pr.tcsA,hsrp:q.pr.hsrp,fastag:q.pr.fastag,
      insuranceType:q.pr.insuranceType,insurance:q.pr.ins,
      rto:q.pr.rto,handling:0,discount:q.pr.disc||q.pr.discount||0,otherCharges:q.pr.other,onRoadPrice:q.pr.orp,
      hypothecation:q.hypothecation,notes:q.notes
    };
    const resp=await fetch(SHEETS_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(resp.ok) toast("☁️ Synced to Google Sheets"); else toast("⚠️ Sync failed — saved locally");
  } catch { toast("📴 Offline — saved locally"); }
}
