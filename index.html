// ---- Number to Words (Indian) ----
function numToWords(n) {
  n = Math.round(n);
  if (!n || n === 0) return "Zero";
  const ones = ["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine",
    "Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const tens = ["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  function h(num) {
    if (num === 0) return "";
    if (num < 20) return ones[num] + " ";
    if (num < 100) return tens[Math.floor(num/10)] + " " + (ones[num%10] ? ones[num%10] + " " : "");
    return ones[Math.floor(num/100)] + " Hundred " + h(num%100);
  }
  let r = "", x = n;
  const cr = Math.floor(x/10000000); x %= 10000000;
  const lac = Math.floor(x/100000); x %= 100000;
  const th = Math.floor(x/1000); x %= 1000;
  if (cr) r += h(cr) + "Crore ";
  if (lac) r += h(lac) + "Lakh ";
  if (th) r += h(th) + "Thousand ";
  if (x) r += h(x);
  return r.trim() + " Only";
}

function getVisibleQuotes(user, allQuotes) {
  if([ROLE.OWNER, ROLE.GM, ROLE.SM].includes(user.role)) return allQuotes;
  if(user.role === ROLE.TL) {
    const staff = getStaff();
    const myExecs = staff.filter(s => s.teamId === user.teamId && s.role === ROLE.EXEC).map(s => s.name);
    myExecs.push(user.name);
    return allQuotes.filter(q => myExecs.includes(q.exec));
  }
  return allQuotes.filter(q => q.exec === user.name);
}

// ---- Vehicle Data ----
const VEHICLE_CACHE_KEY = "pt_vehicle_cache_v1";

function loadVehicleData(force) {
  if(VEHICLE_LOADED && !force) return Promise.resolve();

  // Load from cache instantly
  try {
    const cached = localStorage.getItem(VEHICLE_CACHE_KEY);
    if(cached) {
      const parsed = JSON.parse(cached);
      if(parsed && parsed.length > 0) {
        VEHICLE_DATA = parsed;
        VEHICLE_LOADED = true;
        if(formState.model) renderVariantDD();
      }
    }
  } catch(e) {}

  // Always fetch fresh from Sheets in background — never blocks the form
  loadViaJSONP(null);
  return Promise.resolve();
}

function loadViaJSONP(resolve) {
  const callbackName = "ptCB"+Date.now();
  const script = document.createElement("script");
  const timeout = setTimeout(() => {
    delete window[callbackName];
    if(script.parentNode) script.remove();
    toast("⚠️ Could not load vehicle data");
    showLoadRetry("Connection failed — check internet & Apps Script deployment");
    if(resolve) resolve();
  }, 12000);
  window[callbackName] = function(json) {
    clearTimeout(timeout);
    delete window[callbackName];
    if(script.parentNode) script.remove();
    if(json.status==="ok" && json.data && json.data.length>0){
      VEHICLE_DATA=json.data; VEHICLE_LOADED=true;
      localStorage.setItem(VEHICLE_CACHE_KEY, JSON.stringify(json.data));
      toast("✅ "+json.data.length+" vehicles loaded");
      const retryDiv=document.getElementById("vehicle-load-retry");
      if(retryDiv) retryDiv.remove();
      if(formState.model) renderVariantDD();
    } else {
      const msg=json.msg||"No data returned";
      if(!VEHICLE_LOADED) { toast("⚠️ "+msg); showLoadRetry(msg); }
      else toast("⚠️ Using cached vehicle data");
    }
    if(resolve) resolve();
  };
  script.src = SHEETS_URL+"?action=getVehicles&callback="+callbackName+"&t="+Date.now();
  script.onerror = () => {
    clearTimeout(timeout);
    delete window[callbackName];
    toast("⚠️ Script failed — re-deploy Apps Script as Anyone");
    showLoadRetry("Script blocked. Go to Apps Script → Deploy → Manage → Edit → Who has access = Anyone");
    if(resolve) resolve();
  };
  document.head.appendChild(script);
}

function showLoadRetry(msg) {
  const existing = document.getElementById("vehicle-load-retry");
  if(existing) existing.remove();
  const variantWrap = document.getElementById("variant-wrap");
  if(!variantWrap) return;
  const div = document.createElement("div");
  div.id = "vehicle-load-retry";
  div.style.cssText = "background:#fff0f0;border:1px solid #EB0A1E;border-radius:8px;padding:10px 14px;margin-top:8px;";
  div.innerHTML = `<div style="font-size:12px;color:#EB0A1E;margin-bottom:6px;">⚠️ Vehicle data not loaded: ${msg}</div>
    <button onclick="loadVehicleData(true)" style="padding:8px 16px;background:#EB0A1E;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">↻ Retry Loading</button>`;
  variantWrap.parentNode.insertBefore(div, variantWrap);
}

function initLogin() {
  pinBuffer="";
  buildPinPad(); renderPinDots();
  const sel = document.getElementById("exec-select");

  function populateSel(staff) {
    if(!staff || staff.length === 0) return;
    LOADED_STAFF = staff;
    const prev = sel.value;
    sel.innerHTML='<option value="">— Select Your Name —</option>';
    staff.forEach(s=>{
      const o=document.createElement("option");
      o.value=s.id; o.textContent=s.name+" ("+s.role+")"; sel.appendChild(o);
    });
    if(prev) sel.value=prev;
    sel.onchange=()=>{ pinBuffer=""; renderPinDots(); document.getElementById("login-error").textContent=""; };
  }

  // Populate instantly from DEFAULT_STAFF — always available, no network needed
  populateSel(DEFAULT_STAFF);

  // Fetch from Sheets and update dropdown
  fetchStaffFromSheets(function(staff) {
    if(staff && staff.length > 0) {
      populateSel(staff);
      toast("✅ Staff loaded from Sheets: "+staff.length+" members");
    } else {
      toast("⚠️ Sheets returned no staff — showing default list");
    }
  });
}

function fetchStaffFromSheets(callback) {
  if(!SHEETS_URL) { callback(null); return; }
  // Go straight to JSONP — XHR fails on Apps Script due to CORS redirects
  const cbName = "ptSF"+Date.now();
  const script = document.createElement("script");
  const timer = setTimeout(()=>{
    delete window[cbName];
    if(script.parentNode) script.remove();
    toast("⚠️ Staff fetch timed out — using default list");
    callback(null);
  }, 10000);
  window[cbName] = function(json) {
    clearTimeout(timer); delete window[cbName];
    if(script.parentNode) script.remove();
    try {
      if(json && json.status==="ok") {
        let s = json.staff;
        if(typeof s === "string") s = JSON.parse(s);
        if(Array.isArray(s) && s.length > 0) {
          // Map all rows — only skip rows with no name at all
          const cleaned = s
            .filter(x => x.name && String(x.name).trim() !== "")
            .map(x => ({
              id:     String(x.id     || "u"+Math.random().toString(36).slice(2,6)).trim(),
              name:   String(x.name   || "").trim(),
              role:   String(x.role   || "Guest Experience Manager").trim(),
              pin:    String(x.pin    || "0000").replace(/\.0$/, "").trim(),
              teamId: (x.teamId && String(x.teamId).trim() !== "") ? String(x.teamId).trim() : null,
              mobile: String(x.mobile || "").replace(/\.0$/, "").trim()
            }));
          if(cleaned.length > 0) {
            callback(cleaned);
            return;
          }
        }
      }
    } catch(e) { console.log("Staff parse error:", e); }
    callback(null);
  };
  script.src = SHEETS_URL+"?action=getStaff&callback="+cbName+"&t="+Date.now();
  script.onerror = ()=>{
    clearTimeout(timer); delete window[cbName];
    toast("⚠️ Apps Script unreachable — check deployment");
    callback(null);
  };
  document.head.appendChild(script);
}

function buildPinPad() {
  const pad=document.getElementById("pin-pad"); pad.innerHTML="";
  [1,2,3,4,5,6,7,8,9,"",0,"⌫"].forEach(k=>{
    const btn=document.createElement("button");
    btn.className="pin-key"+(k==="⌫"?" del":"");
    btn.textContent=k;
    if(k===""){btn.disabled=true;btn.style.cssText="background:transparent;border:none;";}
    btn.addEventListener("click",()=>handlePin(String(k)));
    pad.appendChild(btn);
  });
}
function renderPinDots() { document.querySelectorAll("#pin-dots span").forEach((d,i)=>d.classList.toggle("filled",i<pinBuffer.length)); }
function handlePin(k) {
  if(k==="⌫"){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return;}
  if(k===""||pinBuffer.length>=4) return;
  pinBuffer+=k; renderPinDots();
  if(pinBuffer.length===4) setTimeout(tryLogin,120);
}
function tryLogin() {
  const errEl=document.getElementById("login-error");
  const staffId=document.getElementById("exec-select").value;
  if(!staffId){errEl.textContent="Please select your name first.";pinBuffer="";renderPinDots();return;}
  const staff=LOADED_STAFF || getStaff(); // Use Sheets-fetched staff if available
  const user=staff.find(s=>s.id===staffId);
  if(user&&user.pin===pinBuffer){
    currentUser={...user}; errEl.textContent="";
    loadVehicleData();
    // Sync all quotes from Sheets on login (background)
    syncQuotesFromSheets(null);
    loadMonthlyTargetFromSheets();
    if([ROLE.OWNER,ROLE.GM,ROLE.SM,ROLE.TL].includes(user.role)) goTo("dashboard");
    else goTo("home");
  } else { errEl.textContent="Incorrect PIN. Please try again."; pinBuffer=""; renderPinDots(); }
}

// ============================================================
// SYNC QUOTES FROM SHEETS ON LOGIN
// ============================================================
function syncQuotesFromSheets(callback) {
  if(!SHEETS_URL) { if(callback) callback(); return; }
  const cbName = "ptQS"+Date.now();
  const script = document.createElement("script");
  const timer = setTimeout(()=>{
    delete window[cbName];
    if(script.parentNode) script.remove();
    if(callback) callback();
  }, 15000);
  window[cbName] = function(json) {
    clearTimeout(timer); delete window[cbName];
    if(script.parentNode) script.remove();
    if(json && json.status==="ok" && json.quotes && json.quotes.length > 0) {
      // Merge: Sheets wins on conflict
      const local = loadQuotes();
      const map = {};
      local.forEach(q=>{ map[q.id]=q; });
      json.quotes.forEach(q=>{ map[q.id]=q; });
      const merged = Object.values(map).sort((a,b)=>(b.savedAt||0)-(a.savedAt||0));
      localStorage.setItem(SK, JSON.stringify(merged));

      // Rebuild SoldLost + FollowUp from Sheets data — ensures cross-device consistency
      if(json.quotes.length > 0) {
        // ── SoldLost: rebuild from Sheets Status column ──
        const localSL = loadSoldLost();
        const slMap = { ...localSL };
        json.quotes.forEach(q => {
          if(q.status === "Sold" || q.status === "Lost") {
            slMap[q.id] = {
              status:   q.status,
              note:     q.statusNote || "",
              date:     q.statusDate || "",
              by:       q.statusBy   || ""
            };
          }
        });
        localStorage.setItem("pt_soldlost_v1", JSON.stringify(slMap));

        // ── FollowUp: merge Sheets data with local logs ──
        const localFU = loadFollowups();
        const fuMap = {};
        localFU.forEach(fu => { fuMap[fu.quoteId] = fu; });
        json.quotes.forEach(q => {
          if(q.followupDate || q.followupStatus || q.followupLog) {
            const existing = fuMap[q.id] || { quoteId:q.id, logs:[] };
            fuMap[q.id] = existing;
            if(q.followupDate)   existing.nextDate = q.followupDate;
            if(q.followupStatus) existing.status   = q.followupStatus;
            // Restore log entries from Sheets if local is empty
            if(q.followupLog && (!existing.logs || existing.logs.length === 0)) {
              existing.logs = q.followupLog.split(" | ").map(entry => {
                const m = entry.match(/^(.+?) \[(.+?)\]: (.+)$/);
                return m ? { date:m[1], by:m[2], note:m[3] } : { date:"", by:"", note:entry };
              });
            }
          }
        });
        localStorage.setItem("pt_followups_v1", JSON.stringify(Object.values(fuMap)));
      }

      // Refresh current screen
      if(currentUser) {
        const homeActive = document.getElementById("screen-home")?.classList.contains("active");
        const dashActive = document.getElementById("screen-dashboard")?.classList.contains("active");
        const fuActive = document.getElementById("screen-followups")?.classList.contains("active");
        if(homeActive) { renderHome(); }
        if(dashActive) renderDashboard();
        if(fuActive) renderFollowups();
      }
      // Update sync timestamp
      const ts = document.getElementById("sync-ts");
      if(ts) ts.textContent = "↻ "+new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    }
    if(callback) callback();
  };
  script.src = SHEETS_URL+"?action=getAllQuotes&callback="+cbName+"&t="+Date.now();
  script.onerror = ()=>{ clearTimeout(timer); delete window[cbName]; if(callback) callback(); };
  document.head.appendChild(script);
}
function renderHome() {
  if(!currentUser) return;
  document.getElementById("home-exec-name").textContent=currentUser.name;
  document.getElementById("hero-greeting").textContent=greeting();
  document.getElementById("hero-name").textContent=currentUser.name.split(" ")[0];
  const all=loadQuotes();
  const mine=getVisibleQuotes(currentUser,all);
  const pipeline=mine.reduce((s,q)=>s+(q.pr?.orp||0),0);
  document.getElementById("hs-total").textContent=mine.length;
  document.getElementById("hs-month").textContent=mine.filter(thisMonth).length;
  document.getElementById("hs-value").textContent=pipeline>=1e7?`₹${(pipeline/1e7).toFixed(1)}Cr`:pipeline>=1e5?`₹${(pipeline/1e5).toFixed(0)}L`:`₹${Math.round(pipeline/1000)}K`;
  // Show overdue follow-up alert
  const overdueEl = document.getElementById("home-overdue-alert");
  if(overdueEl) {
    const followups = loadFollowups();
    const myIds = new Set(mine.map(q=>q.id));
    const overdueCount = followups.filter(fu=>myIds.has(fu.quoteId)&&isOverdue(fu.nextDate)&&fu.status!=="Closed"&&fu.status!=="Sold"&&fu.status!=="Lost").length;
    overdueEl.style.display = overdueCount>0?"flex":"none";
    overdueEl.textContent = `⚠️ ${overdueCount} overdue follow-up${overdueCount>1?"s":""}  — Tap to view`;
  }
  renderHomeQuotes();
}
function renderHomeQuotes() {
  const all=loadQuotes();
  const soldLostMap=loadSoldLost();
  const visible=getVisibleQuotes(currentUser,all).filter(q=>!soldLostMap[q.id]);
  const s=(document.getElementById("home-search")?.value||"").toLowerCase();
  const filtered=s?visible.filter(x=>(x.cust?.name||"").toLowerCase().includes(s)||(x.veh?.model||"").toLowerCase().includes(s)||(x.cust?.phone||"").includes(s)||(x.id||"").toLowerCase().includes(s)||(x.veh?.suffix||"").toLowerCase().includes(s)):visible;
  const list=document.getElementById("home-quote-list");
  if(!filtered.length){list.innerHTML=`<div class="empty-state">No quotations yet.<br>Tap "+ New Quotation" to start.</div>`;return;}
  const followups = loadFollowups();
  const fuMap = {};
  followups.forEach(fu=>{ fuMap[fu.quoteId]=fu; });
  list.innerHTML=filtered.map(q=>{
    const fu = fuMap[q.id];
    const status = fu?.status||"";
    const overdue = fu && isOverdue(fu.nextDate) && status!=="Closed" && status!=="Sold" && status!=="Lost";
    const statusColor = status==="Hot Lead"?"#EB0A1E":status==="Interested"?"#1D9E75":status==="Closed"?"#888":overdue?"#EB0A1E":"#aaa";
    const statusBg = status==="Hot Lead"?"#fff0f0":status==="Interested"?"#e8f5f0":status==="Closed"?"#f5f5f5":overdue?"#fff0f0":"#f5f5f5";
    const statusLabel = overdue?"⚠️ Overdue":(status||"No Follow-up");
    return `
    <div class="qcard" onclick="openQuote('${q.id}')">
      <div class="qcard-top"><span class="qcard-name">${q.cust?.name||"—"}</span><span class="qcard-date">${q.date||""}</span></div>
      <div class="qcard-vehicle">${q.veh?.model||""} · ${q.veh?.variant||""}</div>
      <div class="qcard-bottom">
        <span class="qcard-id">#${q.id} · <span style="font-family:monospace">${q.veh?.suffix||""}</span></span>
        ${status?`<span style="font-size:10px;font-weight:700;color:${statusColor};background:${statusBg};padding:2px 7px;border-radius:8px;">${statusLabel}</span>`:""}
        <span class="qcard-price">${formatINR(q.pr?.orp)}</span>
      </div>
    </div>`;
  }).join("");
}
function openQuote(id) {
  const q=loadQuotes().find(x=>x.id===id); if(!q) return;
  currentQuote=q; renderPreview(q); goTo("preview");
}

// ============================================================
// DASHBOARD FILTER STATE
// ============================================================
let dashFilters = {
  period: "all",   // all | today | month
  team:   "all",   // all | T1 | T2 ...
  gem:    "all",   // all | exec name (TL view)
  model:  "all",   // all | model name
  hypo:   "all",   // all | yes | no
};

// ============================================================
// DASHBOARD (TL / SM / GM / Owner)
// ============================================================
function renderDashboard() {
  if(!currentUser) return;
  const all = loadQuotes();
  const visible = getVisibleQuotes(currentUser, all);
  const staff = getStaff();
  const now = new Date();
  const soldLostMap = loadSoldLost();
  const activeVisible = visible.filter(q => !soldLostMap[q.id]);
  const isHighRole = [ROLE.OWNER, ROLE.GM, ROLE.SM].includes(currentUser.role);
  const isTL = currentUser.role === ROLE.TL;

  // ── Apply filters ──
  let filtered = activeVisible;

  // Period
  if(dashFilters.period === "today")
    filtered = filtered.filter(q => {
      // Compare using the quote date string — most reliable across timezones
      // q.date is stored as "21 Jun 2025" format
      const qDate = new Date(q.date||0);
      const todayStr = now.getDate()+"/"+now.getMonth()+"/"+now.getFullYear();
      const qDateStr = qDate.getDate()+"/"+qDate.getMonth()+"/"+qDate.getFullYear();
      if(todayStr === qDateStr) return true;
      // Also check savedAt as secondary (for quotes created today before sync)
      if(q.savedAt && q.savedAt > 1000000000000) {
        const sd = new Date(q.savedAt);
        return sd.getFullYear()===now.getFullYear() && sd.getMonth()===now.getMonth() && sd.getDate()===now.getDate();
      }
      return false;
    });
  else if(dashFilters.period === "month")
    filtered = filtered.filter(thisMonth);

  // Team (Owner/GM/SM only)
  if(isHighRole && dashFilters.team !== "all") {
    const teamMembers = staff.filter(s => s.teamId === dashFilters.team).map(s => s.name);
    filtered = filtered.filter(q => teamMembers.includes(q.exec));
  }

  // GEM filter (Team Leader only)
  if(isTL && dashFilters.gem !== "all") {
    filtered = filtered.filter(q => q.exec === dashFilters.gem);
  }

  // Model
  if(dashFilters.model !== "all")
    filtered = filtered.filter(q => (q.veh?.model||"") === dashFilters.model);

  // Hypothecation
  if(dashFilters.hypo === "yes")
    filtered = filtered.filter(q => q.hypothecation && q.hypothecation !== "" && q.hypothecation.toLowerCase() !== "self" && q.hypothecation.toLowerCase() !== "no" && q.hypothecation.toLowerCase() !== "none");
  else if(dashFilters.hypo === "no")
    filtered = filtered.filter(q => !q.hypothecation || q.hypothecation === "" || q.hypothecation.toLowerCase() === "self" || q.hypothecation.toLowerCase() === "no" || q.hypothecation.toLowerCase() === "none");

  const totalORP = filtered.reduce((s,q) => s+(q.pr?.orp||0), 0);
  const pv = totalORP>=1e7?`₹${(totalORP/1e7).toFixed(1)}Cr`:totalORP>=1e5?`₹${(totalORP/1e5).toFixed(0)}L`:`₹${Math.round(totalORP/1000)}K`;

  // Executive performance
  const execMap = {};
  activeVisible.forEach(q => {
    const e = q.exec||"Unknown";

    execMap[e].count++; execMap[e].value += q.pr?.orp||0;
  });
  const execRows = Object.entries(execMap).sort((a,b) => b[1].value-a[1].value);
  const maxVal = execRows[0]?.[1]?.value||1;

  // Team list for filter (Owner/GM/SM)
  const teams = [...new Set(staff.filter(s=>s.teamId).map(s=>s.teamId))].sort();
  const teamLabels = teams.map(t => {
    const tl = staff.find(s => s.role===ROLE.TL && s.teamId===t);
    return [t, tl ? t+" · "+tl.name.split(" ")[0] : t];

  // GEM list for TL filter (only their team members)
  const myGEMs = isTL ? staff.filter(s => s.teamId === currentUser.teamId && s.role === ROLE.EXEC) : [];

  // Model list for filter
  const models = [...new Set(activeVisible.map(q=>q.veh?.model||"").filter(Boolean))].sort();

  // Stats counts using correct date comparison

    const qDate = new Date(q.date||0);
    const todayStr = now.getDate()+"/"+now.getMonth()+"/"+now.getFullYear();
    const qDateStr = qDate.getDate()+"/"+qDate.getMonth()+"/"+qDate.getFullYear();
    if(todayStr === qDateStr) return true;
    if(q.savedAt && q.savedAt > 1000000000000) {
      const sd = new Date(q.savedAt);

              <div style="font-size:13px;font-weight:800;color:${pctColor}">${pct}% achieved</div>
              ${[ROLE.OWNER].includes(currentUser.role)?`<button onclick="setMonthlyTarget()" style="font-size:11px;color:#EB0A1E;background:none;border:1px solid #EB0A1E;border-radius:6px;padding:3px 8px;cursor:pointer;font-family:inherit">Edit Target</button>`:""}
            </div>
          </div>`
        :[ROLE.OWNER].includes(currentUser.role)?`
          <button onclick="setMonthlyTarget()" style="width:100%;padding:10px;background:transparent;border:1.5px dashed #ddd;color:#aaa;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:14px;">＋ Set Monthly Target</button>`:""
        ;
      })()}
      <div class="section-label">PERFORMANCE</div>
      ${execRows.slice(0,8).map(([name,d])=>`
        <div class="mgr-exec-row">
          <div class="mgr-exec-name">${name}</div>

      <div class="section-label" style="margin-top:16px">FILTERS</div>

      <div style="font-size:10px;color:#999;font-weight:700;letter-spacing:0.5px;margin-bottom:4px">PERIOD</div>
      <div class="mgr-filter-row">
        ${[["all","All"],["today","Today"],["month","This Month"]].map(([v,l])=>`

      </div>

      ${isHighRole ? `

      <div class="mgr-filter-row">

      </div>` : ""}

      ${isTL && myGEMs.length > 0 ? `

      <div class="mgr-filter-row">
        <button class="mgr-filter${dashFilters.gem==="all"?" active":""}" onclick="dashFilters.gem='all';renderDashboard()">All GEMs</button>
        ${myGEMs.map(g=>`<button class="mgr-filter${dashFilters.gem===g.name?" active":""}" onclick="dashFilters.gem='${g.name.replace(/'/g,"\'")}';renderDashboard()">${g.name.split(" ")[0]}</button>`).join("")}
      </div>` : ""}

      <div style="font-size:10px;color:#999;font-weight:700;letter-spacing:0.5px;margin:8px 0 4px">MODEL</div>
      <div class="mgr-filter-row">
        <button class="mgr-filter${dashFilters.model==="all"?" active":""}" onclick="dashFilters.model='all';renderDashboard()">All Models</button>
        ${models.map(m=>`<button class="mgr-filter${dashFilters.model===m?" active":""}" onclick="dashFilters.model='${m.replace(/'/g,"\'")}';renderDashboard()">${m.replace("Toyota ","")}</button>`).join("")}

      <div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px">

  // Render quote list separately so search can re-filter

function setMonthlyTarget() {
  const current = monthlyTarget>0?formatINR(monthlyTarget):"Not set";
  const input = prompt("Set monthly On-Road Price target (Current: "+current+") — Enter in ₹ (e.g. 10000000 for 1Cr):", monthlyTarget||"");
  if(input === null) return;
  const val = parseInt(String(input).replace(/[^0-9]/g,""))||0;
  monthlyTarget = val;
  localStorage.setItem("pt_monthly_target", val);
  // Sync target to Sheets so all devices see it
  if(SHEETS_URL) {
    fetch(SHEETS_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({action:"saveSetting", key:"monthly_target", value:String(val)}),
      redirect:"follow"
    }).catch(()=>{});
  }
  renderDashboard();
  toast(val>0?"✅ Target set to "+formatINR(val)+" — synced to all devices":"Target cleared");
}

function loadMonthlyTargetFromSheets() {
  if(!SHEETS_URL) return;
  const cbName = "ptMT"+Date.now();
  const script = document.createElement("script");
  const timer = setTimeout(()=>{ delete window[cbName]; if(script.parentNode) script.remove(); }, 8000);
  window[cbName] = function(json) {
    clearTimeout(timer); delete window[cbName];
    if(script.parentNode) script.remove();
    if(json && json.status==="ok" && json.value) {
      const val = parseInt(json.value)||0;
      if(val !== monthlyTarget) {
        monthlyTarget = val;
        localStorage.setItem("pt_monthly_target", val);
        // Refresh dashboard if active
        if(document.getElementById("screen-dashboard")?.classList.contains("active")) renderDashboard();
      }
    }
  };
  script.src = SHEETS_URL+"?action=getSetting&key=monthly_target&callback="+cbName+"&t="+Date.now();
  script.onerror = ()=>{ clearTimeout(timer); delete window[cbName]; };
  document.head.appendChild(script);
}

function renderDashboardQuoteList(filtered) {
  const searchEl = document.getElementById("dash-search");
  const s = (searchEl?.value||"").toLowerCase();
  const followups = loadFollowups();
  const fuMap = {};
  followups.forEach(fu=>{ fuMap[fu.quoteId]=fu; });

  let list = filtered;
  if(s) list = filtered.filter(q=>
    (q.cust?.name||"").toLowerCase().includes(s)||
    (q.cust?.phone||"").includes(s)||
    (q.veh?.model||"").toLowerCase().includes(s)||
    (q.exec||"").toLowerCase().includes(s)||
    (q.id||"").toLowerCase().includes(s)
  );

  const el = document.getElementById("dash-quote-list");
  if(!el) return;
  if(!list.length){ el.innerHTML=`<div class="empty-state">No quotes match.</div>`; return; }

  el.innerHTML = list.map(q=>{
    const fu = fuMap[q.id];
    const status = fu?.status||"";
    const overdue = fu && isOverdue(fu.nextDate) && status!=="Closed" && status!=="Sold" && status!=="Lost";
    const statusColor = status==="Hot Lead"?"#EB0A1E":status==="Interested"?"#1D9E75":overdue?"#EB0A1E":"#aaa";
    const statusBg = status==="Hot Lead"?"#fff0f0":status==="Interested"?"#e8f5f0":overdue?"#fff0f0":"#f5f5f5";
    const statusLabel = overdue?"⚠️ Overdue":(status||"");
    return `
      <div class="qcard" onclick="openQuote('${q.id}')">
        <div class="qcard-top"><span class="qcard-name">${q.cust?.name||"—"}</span><span class="qcard-date">${q.date||""}</span></div>
        <div class="qcard-vehicle">${q.veh?.model||""} · ${q.veh?.variant||""} · <span style="font-family:monospace;font-size:11px">${q.veh?.suffix||""}</span></div>
        <div class="qcard-bottom">
          <span class="qcard-exec">${q.exec||"—"}</span>
          ${statusLabel?`<span style="font-size:10px;font-weight:700;color:${statusColor};background:${statusBg};padding:2px 7px;border-radius:8px;">${statusLabel}</span>`:""}
          <span class="qcard-price">${formatINR(q.pr?.orp)}</span>
        </div>
        <div style="font-size:10px;color:#999;margin-top:4px;">${q.hypothecation&&q.hypothecation!==""?"🏦 "+q.hypothecation:"💵 Self Finance"}</div>
      </div>`;
  }).join("");
}

// Can currentUser modify targetStaff member?
function canModifyStaff(targetRole) {
  if(!currentUser) return false;
  if(currentUser.role === ROLE.OWNER) return true; // Owner can modify anyone
  if(currentUser.role === ROLE.GM) return targetRole !== ROLE.OWNER; // GM cannot modify Owner
  if(currentUser.role === ROLE.SM) return targetRole !== ROLE.OWNER && targetRole !== ROLE.GM; // SM cannot modify Owner or GM
  return false;
}
function renderManpower() {
  const staff=getStaff();
  const teams={};
  staff.filter(s=>s.role===ROLE.TL).forEach(tl=>{ teams[tl.teamId]={tl,execs:staff.filter(s=>s.teamId===tl.teamId&&s.role===ROLE.EXEC)}; });
  const senior=staff.filter(s=>[ROLE.OWNER,ROLE.GM,ROLE.SM].includes(s.role));

  const body=document.getElementById("manpower-body");
  body.innerHTML=`

function saveNewStaff() {
  const name=document.getElementById("ns-name").value.trim();
  const role=document.getElementById("ns-role").value;
  const mobile=document.getElementById("ns-mobile")?.value.trim()||"";
  const pin=String(document.getElementById("ns-pin").value).trim();
  const teamSel=document.getElementById("ns-team");
  const teamId=teamSel?teamSel.value:"";
  if(!name||!role||!pin||pin.length!==4){toast("⚠️ Please fill all fields correctly");return;}
  const staff=getStaff();
  // Generate team ID for new TL
  let finalTeamId=teamId;
  if(role===ROLE.TL&&teamId==="NEW"){
    const existing=staff.filter(s=>s.teamId&&s.teamId.startsWith("T")).map(s=>parseInt(s.teamId.slice(1))||0);
    finalTeamId="T"+(Math.max(0,...existing)+1);
  }
  if((role===ROLE.EXEC||role===ROLE.TL)&&!finalTeamId){toast("⚠️ Please select a team");return;}
  const newId="u"+Date.now();
  staff.push({id:newId,name,role,pin,mobile,teamId:finalTeamId||null});
  saveStaff(staff);
  syncStaffToSheets();
  toast("✅ "+name+" added — syncing to Sheets...");
  renderManpower();
}

function saveEditStaff(id) {
  const staff=getStaff();
  const i=staff.findIndex(s=>s.id===id); if(i<0) return;
  const name=document.getElementById("es-name").value.trim();
  const mobile=document.getElementById("es-mobile")?.value.trim()||"";
  const pin=String(document.getElementById("es-pin").value).trim();
  const teamSel=document.getElementById("es-team");
  if(!name||!pin||pin.length!==4){toast("⚠️ Please fill all fields correctly");return;}
  staff[i].name=name; staff[i].pin=pin; staff[i].mobile=mobile;
  if(teamSel) staff[i].teamId=teamSel.value;
  saveStaff(staff);
  syncStaffToSheets();
  toast("✅ Updated & synced to Sheets");
  renderManpower();
}

function deleteStaff(id) {
  const staff=getStaff();
  const s=staff.find(x=>x.id===id); if(!s) return;
  if(!canModifyStaff(s.role)) { toast("⚠️ You don't have permission to remove this staff member"); return; }
  if(!confirm(`Delete ${s.name}? This cannot be undone.`)) return;
  saveStaff(staff.filter(x=>x.id!==id));
  syncStaffToSheets();
  toast("🗑️ "+s.name+" removed");
  renderManpower();
}

// ============================================================
async function syncStaffToSheets() {
  if(!SHEETS_URL) return;
  const staff = LOADED_STAFF && LOADED_STAFF.length > 0 ? LOADED_STAFF : DEFAULT_STAFF;
  try {
    const res = await fetch(SHEETS_URL, {
      method: "POST",
      headers: {"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({action:"saveStaff", staff:JSON.stringify(staff)}),
      redirect: "follow"
    });
    const json = await res.json();
    if(json.status === "ok") {
      toast("✅ Staff synced to Sheets");
    } else {
      toast("⚠️ Staff sync issue: "+(json.msg||"unknown"));
    }
  } catch(e) {
    toast("⚠️ Staff sync failed — check connection");
    console.log("Staff sync error:", e);
  }
}
function restoreStaffFromSheets() {
  if(!SHEETS_URL) { toast("⚠️ No Sheets URL configured"); return; }
  if(!confirm("Restore staff list from Google Sheets? This will overwrite your current local staff data.")) return;
  const callbackName = "ptStaffCB"+Date.now();
  const script = document.createElement("script");
  const timeout = setTimeout(() => {
    delete window[callbackName]; script.remove();
    toast("⚠️ Restore failed — timeout");
  }, 10000);
  window[callbackName] = function(json) {
    clearTimeout(timeout); delete window[callbackName]; script.remove();
    if(json.status==="ok" && json.staff) {
      try {
        const staff = typeof json.staff === "string" ? JSON.parse(json.staff) : json.staff;
        LOADED_STAFF = staff; // Update in-memory only
        toast("✅ Staff restored from Sheets ("+staff.length+" members)");
        renderManpower();
      } catch(e) { toast("⚠️ Could not parse staff data"); }
    } else { toast("⚠️ No staff data in Sheets yet — backup first"); }
  };
  script.src = SHEETS_URL+"?action=getStaff&callback="+callbackName+"&t="+Date.now();
  script.onerror = () => { clearTimeout(timeout); delete window[callbackName]; toast("⚠️ Restore failed"); };
  document.head.appendChild(script);
}

  let html=`<label class="field-label">Insurance Type</label><select class="field-input" id="f-insType" onchange="formState.insuranceType=this.value">`;
  if(isP) html+=`<option value="">— Select —</option><option>Insurance 1+3 Years</option><option>Insurance 3+3 Years</option>`;
  else { html+=`<option value="Insurance 1+1 Years">Insurance 1+1 Years</option>`; formState.insuranceType="Insurance 1+1 Years"; }
  html+=`</select><label class="field-label">Insurance Amount (₹)</label>
    <input class="field-input" id="f-ins" type="number" placeholder="Enter insurance amount" value="${formState.insurance||""}" oninput="formState.insurance=parseFloat(this.value)||0;updateSummary()" />`;
  document.getElementById("insurance-field").innerHTML=html;
}
function renderEPCField() {
  const show=EPC_MODELS.includes(formState.model)&&formState.regType==="Personal"&&formState.custState==="Haryana";
  const epcAmt=show?Math.round(formState.exShowroom*0.01):0;
  if(!show){formState.epc=false;document.getElementById("epc-row").innerHTML="";return;}
  document.getElementById("epc-row").innerHTML=`
    <div class="tcs-row">
      <div><div class="tcs-info">Environmental Protection Cess (EPC)</div>
        <div class="tcs-sub">1% of ex-showroom · ${formatINR(epcAmt)}</div></div>
      <div class="tcs-toggle"><span>${formatINR(epcAmt)}</span>
        <input type="checkbox" id="f-epc" ${formState.epc?"checked":""} onchange="formState.epc=this.checked;updateSummary()" /></div>
    </div>`;
}
function renderEWField() {
  const ew2=formState.ew2||0;
  if(!ew2){
    document.getElementById("ew-field").innerHTML=`<div style="font-size:12px;color:#aaa;padding:8px 2px">Select a vehicle above to see Extended Warranty options.</div>`;
    formState.ewDuration="";formState.ewPrice=0;
    updateSummary();
    return;
  }
  const active=formState.ewDuration==="2 Year / 1,00,000 Kms";
  document.getElementById("ew-field").innerHTML=`
    <div class="tcs-row">
      <div>
        <div class="tcs-info">Extended Warranty</div>
        <div class="tcs-sub">2 Years / 1,00,000 Kms (whichever earlier)</div>
      </div>
      <div class="tcs-toggle">
        <span>${formatINR(ew2)}</span>
        <input type="checkbox" ${active?"checked":""} onchange="onEWToggle(2,${ew2},this.checked)" style="width:20px;height:20px;accent-color:#EB0A1E" />
      </div>
    </div>`;
  updateSummary();
}

function onEWToggle(years, price, checked) {
  const duration=years+" Year / 1,00,000 Kms";
  if(checked){
    // Uncheck the other one first
    formState.ewDuration=duration;
    formState.ewPrice=price;
    // Uncheck other checkbox
    const allEW=document.querySelectorAll("#ew-field input[type=checkbox]");
    allEW.forEach(cb=>{
      if(cb!==event.target) cb.checked=false;
    });
  } else {
    formState.ewDuration="";
    formState.ewPrice=0;
  }
  updateSummary();
}
// onEWSelect replaced by onEWToggle

function calcPricing() {
  const exS=formState.exShowroom||0;
  const tcsA=formState.tcs&&exS>999999?Math.round(exS*0.01):0;
  const epcA=formState.epc?Math.round(exS*0.01):0;
  const ins=parseFloat(formState.insurance)||0;
  const rto=parseFloat(formState.rto)||0;
  const hsrp=formState.hsrp?1500:0;
  const fastag=formState.fastag?800:0;
  const tga=parseFloat(formState.tga)||0;
  const tgloss=parseFloat(formState.tgloss)||0;
  const tsmile=parseFloat(formState.tsmile)||0;
  const ew=parseFloat(formState.ewPrice)||0;
  const other=parseFloat(formState.otherCharges)||0;
  const disc=parseFloat(formState.discount)||0;
  const orp=exS+tcsA+epcA+ins+rto+hsrp+fastag+tga+tgloss+tsmile+ew+other-disc;
  return{exS,tcsA,epcA,ins,rto,hsrp,fastag,tga,tgloss,tsmile,ew,other,disc,orp};
}
function updateSummary() {
  const p=calcPricing();
  const discAmt=p.disc||0;
  const tl=document.getElementById("tcs-label"); if(tl) tl.textContent=`Auto-calculated · ${formatINR(p.tcsA)}`;
  const tv=document.getElementById("tcs-val"); if(tv) tv.textContent=formatINR(p.tcsA);
  const wrap=document.getElementById("price-summary-wrap"); if(!wrap) return;
  const rows=[
    ["Ex-Showroom Price",p.exS],
    [document.getElementById("f-insType")?.value||"Insurance",p.ins],
    [formState.custState==="Haryana"?"RTO & Registration":"Temp. Registration",p.rto],
    ["TCS @ 1%",p.tcsA],
    ["EPC @ 1%",p.epcA],
    ["Extended Warranty"+(formState.ewDuration?" ("+formState.ewDuration+")":""),p.ew],
    ["Toyota Genuine Accessories",p.tga],
    ["T-Gloss",p.tgloss],
    ["HSRP Garnish",p.hsrp],
    ["FASTag",p.fastag],
    ["T-Smile",p.tsmile],
    ["Other Charges",p.other],
  ].filter(([,v])=>v>0);
  wrap.innerHTML=`<div class="price-summary" style="margin-top:16px">
    <div class="section-label" style="margin-bottom:8px">PRICE SUMMARY</div>
    ${rows.map(([l,v])=>`<div class="price-row"><span class="pl">${l}</span><span>${formatINR(v)}</span></div>`).join("")}
    ${discAmt>0?`<div class="price-row discount"><span class="pl">Discount / Offer</span><span style="color:#1a8a4a">− ${formatINR(discAmt)}</span></div>`:""}
    <div class="price-total"><span>On-Road Price</span><span>${formatINR(p.orp)}</span></div>
  </div>`;
  const btn=document.getElementById("gen-btn");
  if(btn) btn.disabled=!(formState.cName&&formState.model&&formState.variant&&formState.exShowroom>0);
}
function confirmGenerateQuote() {
  if(!formState.cName||!formState.cPhone||!formState.model||!formState.variant||!formState.colour) {
    toast("⚠️ Please fill all required fields first"); return;
  }
  generateQuote();
}

function generateQuote() {
  const p=calcPricing();
  const insType=document.getElementById("f-insType")?.value||formState.insuranceType||"";
  const q={
    id:genId(),date:new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),
    savedAt:Date.now(),mfgYear:formState.mfgYear,
    cust:{name:formState.cName,phone:formState.cPhone,city:formState.cCity},
    veh:{model:formState.model,variant:formState.variant,colour:formState.colour,interior:formState.interior,suffix:formState.suffix,fuelType:formState.fuelType},
    reg:{type:formState.regType,state:formState.custState},
    pr:{...p,insuranceType:insType,ewDuration:formState.ewDuration,discount:formState.discount},
    hypothecation:formState.hypothecation,exec:currentUser.name,notes:formState.notes,
  };
  saveQuoteLocal(q);
  syncToSheets(q);
  currentQuote = q;
  try {
    renderPreview(q);
  } catch(err) {
    console.error("renderPreview error:", err);
    document.getElementById("preview-body").innerHTML = '<div style="padding:20px;color:#EB0A1E">Error rendering preview: ' + err.message + '</div>';
  }
  goTo("preview");
  toast("✅ Quotation saved!");
}

function editQuote(id) {
  const q = loadQuotes().find(x=>x.id===id); if(!q) return;
  if(!confirm("Edit this quote? A new quote will be generated with updated details. The original will remain in history.")) return;
  duplicateQuote(id);
  toast("✏️ Edit mode — update details and generate revised quote");
}

function duplicateQuote(id) {
  const q = loadQuotes().find(x=>x.id===id); if(!q) return;
  // Pre-fill formState from existing quote
  initFormState();
  formState.cName = q.cust?.name||"";
  formState.cPhone = q.cust?.phone||"";
  formState.cCity = q.cust?.city||"";
  formState.model = q.veh?.model||"";
  formState.variant = q.veh?.variant||"";
  formState.colour = q.veh?.colour||"";
  formState.interior = q.veh?.interior||"";
  formState.suffix = q.veh?.suffix||"";
  formState.fuelType = q.veh?.fuelType||"";
  formState.exShowroom = q.pr?.exS||0;
  formState.regType = q.reg?.type||"Personal";
  formState.custState = q.reg?.state||"Haryana";
  formState.insurance = q.pr?.ins||0;
  formState.insuranceType = q.pr?.insuranceType||"";
  formState.rto = q.pr?.rto||0;
  formState.tga = q.pr?.tga||0;
  formState.tgloss = q.pr?.tgloss||0;
  formState.tsmile = q.pr?.tsmile||0;
  formState.discount = q.pr?.disc||q.pr?.discount||0;
  formState.otherCharges = q.pr?.other||0;
  formState.hypothecation = q.hypothecation||"";
  formState.mfgYear = q.mfgYear||new Date().getFullYear();
  formState.ew2 = q.pr?.ew||0;
  formState.ewDuration = q.pr?.ewDuration||"";
  formState.ewPrice = q.pr?.ew||0;
  formState.notes = "";
  buildFormHTML();
  // Restore field values after render
  setTimeout(()=>{
    const set = (id,v) => { const el=document.getElementById(id); if(el) el.value=v; };
    set("f-cName", formState.cName);
    set("f-cPhone", formState.cPhone);
    set("f-cCity", formState.cCity);
    set("f-model", formState.model);
    renderVariantDD();
    setTimeout(()=>{
      set("f-variant", formState.variant);
      renderColourDD();
      setTimeout(()=>{
        set("f-colour", formState.colour);
        onColourSelect(formState.colour);
        set("f-rto", formState.rto||"");
        set("f-ins", formState.insurance||"");
        set("f-tga", formState.tga||"");
        set("f-tgloss", formState.tgloss||"");
        set("f-tsmile", formState.tsmile||"");
        set("f-disc", formState.discount||"");
        set("f-other", formState.otherCharges||"");
        set("f-hypo", formState.hypothecation||"");
        updateSummary();
      },300);
    },300);
  },100);
  goTo("form");
  toast("📋 Quote duplicated — edit and regenerate");
}

function goBackFromPreview() {
  if(currentUser&&[ROLE.OWNER,ROLE.GM,ROLE.SM,ROLE.TL].includes(currentUser.role)) goTo("dashboard");

async function sharePDF() {
  const printArea = document.getElementById("quote-print-area");
  if(!printArea) { toast("⚠️ No quotation to share"); return; }

  const q = currentQuote;
  const fileName = `Planet-Toyota-Quotation-${q?.id||"quote"}-${q?.cust?.name||"Customer"}`.replace(/\s+/g,"-");

  toast("⏳ Generating PDF...", 5000);

  // Load libraries in parallel
  function loadScript(src) {
    return new Promise((res, rej) => {
      if(document.querySelector(`script[src="${src}"]`)) { res(); return; }
      const s = document.createElement("script");
      s.src = src; s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  try {
    // Load html2canvas + jsPDF
    await Promise.all([
      loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"),
      loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js")
    ]);

    // ── Force A4 width (794px = A4 at 96dpi) for proper layout ──
    const A4_PX = 794;
    const A4_H_PX = 1123; // A4 height at 96dpi
    const prevStyle = printArea.getAttribute("style") || "";
    printArea.style.width = A4_PX + "px";
    printArea.style.minWidth = A4_PX + "px";
    printArea.style.maxWidth = A4_PX + "px";
    printArea.style.boxSizing = "border-box";
    printArea.style.position = "relative";
    printArea.style.left = "0";
    printArea.style.borderRadius = "0";

    // Allow layout to reflow
    await new Promise(r => setTimeout(r, 400));

    const docW = printArea.scrollWidth;
    const docH = printArea.scrollHeight;

    // Scale so content fits exactly in A4 height (single page guaranteed)
    // If content is taller than A4, we scale down to fit
    const scaleToFit = docH > A4_H_PX ? A4_H_PX / docH : 1;
    const renderScale = Math.min(2.5, 2.5 * scaleToFit);

    const canvas = await html2canvas(printArea, {
      scale: renderScale,
      useCORS: true,
      allowTaint: true,
      backgroundColor: "#ffffff",
      logging: false,
      imageTimeout: 15000,
      width: docW,
      height: docH,
      windowWidth: docW,
      windowHeight: docH,
      x: 0,
      y: 0
    });

    // Restore original style
    printArea.setAttribute("style", prevStyle);

    // Build EXACTLY A4 single page PDF — content scales to fit, no clipping
    const { jsPDF } = window.jspdf;
    const imgData = canvas.toDataURL("image/jpeg", 0.97);
    const pdfW = 210;  // A4 width mm
    const pdfH = 297;  // A4 height mm
    const margin = 5;  // 5mm margin all sides

    const pdf = new jsPDF({
      orientation: "p",
      unit: "mm",
      format: [pdfW, pdfH]
    });

    // Scale image to fill A4 width exactly, then check height fits
    const availW = pdfW - margin * 2;
    const availH = pdfH - margin * 2;
    const imgRatio = canvas.height / canvas.width;

    let drawW = availW;
    let drawH = availW * imgRatio;

    // If height exceeds page, scale down further to fit height
    if(drawH > availH) {
      drawH = availH;
      drawW = availH / imgRatio;
    }

    // Centre on page
    const drawX = margin + (availW - drawW) / 2;
    const drawY = margin + (availH - drawH) / 2;

    pdf.addImage(imgData, "JPEG", drawX, drawY, drawW, drawH, undefined, "FAST");

    // Try sharing as PDF file (Android Chrome supports this)
    if(navigator.share && navigator.canShare) {
      const pdfBlob = pdf.output("blob");
      const pdfFile = new File([pdfBlob], fileName+".pdf", { type: "application/pdf" });
      if(navigator.canShare({ files: [pdfFile] })) {
        try {
          await navigator.share({
            title: "Planet Toyota — Quotation",
            text: `Quotation for ${q?.cust?.name||"Customer"} — ${q?.veh?.model||""} — Quote No: ${q?.id||""}`,
            files: [pdfFile]
          });
          toast("✅ PDF shared!");
          return;
        } catch(shareErr) {
          if(shareErr.name === "AbortError") return;
          // PDF share failed — fallback to image share
        }
      }
    }

    // Fallback 1: Share as high-quality JPEG image
    if(navigator.share) {
      canvas.toBlob(async (blob) => {
        const imgFile = new File([blob], fileName+".jpg", { type: "image/jpeg" });
        try {
          await navigator.share({
            title: "Planet Toyota — Quotation",
            files: [imgFile]
          });
          toast("✅ Quotation shared!");
        } catch(e) {
          if(e.name !== "AbortError") {
            // Fallback 2: Download PDF
            pdf.save(fileName+".pdf");
            toast("✅ PDF saved — open from Downloads to share on WhatsApp");
          }
        }
      }, "image/jpeg", 0.97);
      return;
    }

    // Fallback 2: Direct download
    pdf.save(fileName+".pdf");
    toast("✅ PDF saved to Downloads — share from there on WhatsApp");

  } catch(e) {
    toast("⚠️ " + (e.message||"Could not generate PDF"));
    // Last resort: print dialog
    window.print();
  }
}

async function syncToSheets(q) {

  const payload={
    action:"saveQuote", id:q.id, date:q.date, mfgYear:q.mfgYear, exec:q.exec, savedAt:q.savedAt||Date.now(),
    customerName:q.cust.name, customerPhone:q.cust.phone, customerCity:q.cust.city,
    model:q.veh.model, variant:q.veh.variant, fuelType:q.veh.fuelType,
    colour:q.veh.colour, interior:q.veh.interior||"", suffixCode:q.veh.suffix||"",
    regType:q.reg?.type||"", customerState:q.reg?.state||"",
    exShowroom:q.pr.exS||0, tga:q.pr.tga||0, tgloss:q.pr.tgloss||0, tsmile:q.pr.tsmile||0,
    ewDuration:q.pr.ewDuration||"", ewPrice:q.pr.ew||0,
    epc:q.pr.epcA||0, tcs:q.pr.tcsA||0, hsrp:q.pr.hsrp||0, fastag:q.pr.fastag||0,
    insuranceType:q.pr.insuranceType||"", insurance:q.pr.ins||0,
    rto:q.pr.rto||0, otherCharges:q.pr.other||0, discount:q.pr.disc||q.pr.discount||0,
    onRoadPrice:q.pr.orp||0, hypothecation:q.hypothecation||"", notes:q.notes||""
  };
  const xhr = new XMLHttpRequest();

function loadFollowups() {
  try { return JSON.parse(localStorage.getItem("pt_followups_v1")||"[]"); } catch { return []; }
}
function saveFollowup(fu) {
  const all = loadFollowups();
  const i = all.findIndex(x=>x.quoteId===fu.quoteId);
  if(i>=0) all[i]=fu; else all.unshift(fu);
  localStorage.setItem("pt_followups_v1", JSON.stringify(all));
}
function getFollowupForQuote(quoteId) {
  return loadFollowups().find(x=>x.quoteId===quoteId)||null;
}
function isOverdue(dateStr) {
  if(!dateStr) return false;
  return new Date(dateStr) < new Date(new Date().toDateString());
}
function isToday(dateStr) {
  if(!dateStr) return false;
  return new Date(dateStr).toDateString() === new Date().toDateString();
}

function renderFollowups() {
  const allQuotes = loadQuotes();
  const visible = getVisibleQuotes(currentUser, allQuotes);
  const allFU = loadFollowups();
  
  // Only show follow-ups for quotes this user can see
  const visibleIds = new Set(visible.map(q=>q.id));
  const myFU = allFU.filter(fu=>visibleIds.has(fu.quoteId));
  
  // Sort: overdue first, then today, then upcoming
  const overdue = myFU.filter(fu=>isOverdue(fu.nextDate)&&fu.status!=="Closed");
  const today = myFU.filter(fu=>isToday(fu.nextDate)&&fu.status!=="Closed");
  const upcoming = myFU.filter(fu=>!isOverdue(fu.nextDate)&&!isToday(fu.nextDate)&&fu.status!=="Closed");
  const closed = myFU.filter(fu=>fu.status==="Closed");

  const body = document.getElementById("followup-body");
  body.innerHTML = `
    <div style="padding:16px">
      <button class="new-quote-btn" style="margin-bottom:16px" onclick="renderFollowups()">↻ Refresh</button>

      ${overdue.length?`
        <div class="section-label" style="color:#EB0A1E;margin-bottom:8px">⚠️ OVERDUE (${overdue.length})</div>
        ${overdue.map(fu=>followupCard(fu,visible)).join("")}`:""}

      ${today.length?`
        <div class="section-label" style="color:#f0a500;margin-bottom:8px">📅 TODAY (${today.length})</div>
        ${today.map(fu=>followupCard(fu,visible)).join("")}`:""}

      ${upcoming.length?`
        <div class="section-label" style="margin-bottom:8px">🗓️ UPCOMING (${upcoming.length})</div>
        ${upcoming.map(fu=>followupCard(fu,visible)).join("")}`:""}

      ${!overdue.length&&!today.length&&!upcoming.length?`
        <div class="empty-state" style="padding:60px 0">No pending follow-ups.<br>Set a follow-up from any quotation.</div>`:""}

      ${closed.length?`
        <div class="section-label" style="margin-top:16px;margin-bottom:8px;color:#aaa">✓ CLOSED (${closed.length})</div>
        ${closed.slice(0,5).map(fu=>followupCard(fu,visible)).join("")}`:""}
      <div style="height:28px"></div>
    </div>`;
}

function followupCard(fu, quotes) {
  const q = quotes.find(x=>x.id===fu.quoteId);
  const overdue = isOverdue(fu.nextDate)&&fu.status!=="Closed";
  const today = isToday(fu.nextDate)&&fu.status!=="Closed";
  const borderColor = overdue?"#EB0A1E":today?"#f0a500":"#eee";
  const lastLog = fu.logs&&fu.logs.length?fu.logs[fu.logs.length-1]:null;
  return `
    <div style="background:#fff;border:1.5px solid ${borderColor};border-radius:12px;padding:12px 14px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
        <div>

          <div style="font-size:11px;color:#aaa;margin-top:1px">#${fu.quoteId} · ${q?.exec||""}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;font-weight:700;color:${overdue?"#EB0A1E":today?"#f0a500":"#888"}">${fu.nextDate||"—"}</div>
          <div style="font-size:10px;padding:2px 7px;border-radius:10px;margin-top:3px;display:inline-block;background:${fu.status==="Closed"?"#e8f5e9":overdue?"#fff0f0":today?"#fff8e1":"#f5f5f5"};color:${fu.status==="Closed"?"#2e7d32":overdue?"#EB0A1E":today?"#f0a500":"#666"}">${fu.status||"Pending"}</div>
        </div>
      </div>
      ${lastLog?`<div style="font-size:11px;color:#555;background:#f8f8f8;border-radius:6px;padding:6px 10px;margin-bottom:8px;">💬 ${lastLog.date}: ${lastLog.note}</div>`:""}
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button onclick="openFollowupDetail('${fu.quoteId}')" style="padding:6px 11px;background:#EB0A1E;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Update</button>
        <button onclick="openQuote('${fu.quoteId}')" style="padding:6px 11px;background:transparent;border:1px solid #ddd;color:#555;border-radius:6px;font-size:12px;cursor:pointer">View</button>
        ${fu.status!=="Closed"?`<button onclick="closeFollowup('${fu.quoteId}')" style="padding:6px 11px;background:transparent;border:1px solid #1a8a4a;color:#1a8a4a;border-radius:6px;font-size:12px;cursor:pointer">Closed</button>`:""}
        <button onclick="markAsSold('${fu.quoteId}')" style="padding:6px 11px;background:#1a8a4a;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">✅ Sold</button>

      </div>
    </div>`;
}

function saveFollowupDetail(quoteId) {
  const date = document.getElementById("fu-date").value;

  fu.status = "Lost"; fu.updatedAt = Date.now();
  fu.logs = fu.logs||[];
  fu.logs.push({date:new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),note:"❌ LOST — "+(note||""),by:currentUser?.name||""});
  saveFollowup(fu);
  syncSoldLostToSheets(quoteId, "Lost", note, q);
  toast("Quote marked as Lost — removed from active list");
  renderFollowups();
}

async function syncSoldLostToSheets(quoteId, status, note, q) {
  if(!SHEETS_URL) return;
  try {
    const payload = {
      action: "updateQuoteStatus",
      id: quoteId,
      status: status,
      statusNote: note||"",
      statusDate: new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}),
      statusBy: currentUser?.name||"",
    };
    await fetch(SHEETS_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload), redirect:"follow"});
  } catch(e) { console.log("Sync error:", e); }
}

async function syncFollowupToSheets(quoteId, fu) {
  if(!SHEETS_URL) return;
  try {
    const payload = {
      action: "updateFollowup",
      id: quoteId,
      followupDate: fu.nextDate||"",
      followupStatus: fu.status||"",
      followupLogs: (fu.logs||[]).map(l=>`${l.date||""} [${l.by||""}]: ${l.note||""}`).join(" | "),
    };
    await fetch(SHEETS_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload), redirect:"follow"});
  } catch(e) { console.log("Followup sync error:", e); }
}
const _origRD = renderDashboard;
renderDashboard = function() {
  _origRD();
  const el = document.getElementById("dash-role-label");
  if(el && currentUser) el.textContent = currentUser.role;
};

// ── Page init ──
window.addEventListener("DOMContentLoaded", function() {
  initLogin();
});

// ── Real-time sync: poll Sheets every 30 seconds ──
setInterval(function() {
  if(currentUser) {
    syncQuotesFromSheets(null);
  }
}, 30000);
</script>
